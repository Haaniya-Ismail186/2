<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advanced Gaming Lab | Preview</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Oxanium:wght@300;500;800&display=swap');

        :root {
            --p-red: #ff003c;
            --glow-color: #ff003c;
            --glass-bg: rgba(0, 0, 0, 0.7);
            --neon-border: rgba(255, 255, 255, 0.1);
        }

        body, html {
            height: 100%;
            margin: 0;
            background-color: #050505;
            color: white;
            font-family: 'Oxanium', sans-serif;
            overflow: hidden;
        }

        /* --- Background Matrix & Scanlines --- */
        .lab-bg {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at center, #111 0%, #000 100%);
            z-index: -1;
        }

        .lab-bg::after {
            content: " ";
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.03), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.03));
            background-size: 100% 2px, 3px 100%;
            pointer-events: none;
        }

        /* --- Responsive Main Container --- */
        .preview-wrapper {
            height: 100vh;
            display: flex;
            flex-direction: column;
            padding: 20px;
        }

        @media (min-grow: 992px) {
            .preview-wrapper { flex-direction: row; }
        }

        /* --- Stylish HUD Frame --- */
        .hud-container {
            flex: 1;
            border: 1px solid var(--neon-border);
            background: var(--glass-bg);
            backdrop-filter: blur(15px);
            position: relative;
            display: flex;
            flex-direction: column;
            clip-path: polygon(0 0, 100% 0, 100% 90%, 95% 100%, 0 100%);
            box-shadow: 0 0 40px rgba(0,0,0,0.5);
        }

        @media (min-width: 992px) {
            .hud-container { flex-direction: row; }
        }

        /* --- Sidebar Info (Responsive) --- */
        .side-panel {
            padding: 30px;
            border-bottom: 1px solid var(--neon-border);
            background: linear-gradient(180deg, rgba(255,0,60,0.05), transparent);
        }

        @media (min-width: 992px) {
            .side-panel {
                width: 380px;
                border-bottom: none;
                border-right: 1px solid var(--neon-border);
                display: flex;
                flex-direction: column;
                justify-content: space-between;
            }
        }

        .status-tag {
            font-size: 0.6rem;
            color: var(--p-red);
            border: 1px solid var(--p-red);
            padding: 2px 10px;
            letter-spacing: 3px;
            text-transform: uppercase;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse { 50% { opacity: 0.3; } }

        h1#p-name {
            font-weight: 800;
            text-transform: uppercase;
            margin-top: 15px;
            letter-spacing: -1px;
            color: white;
            text-shadow: 0 0 15px var(--glow-color);
        }

        /* --- Main Visual Display --- */
        .viewport-main {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            min-height: 350px;
        }

        .big-icon {
            font-size: clamp(6rem, 20vw, 15rem);
            color: white;
            filter: drop-shadow(0 0 30px var(--glow-color));
            animation: floating 4s ease-in-out infinite;
            z-index: 5;
        }

        @keyframes floating {
            0%, 100% { transform: translateY(0) scale(1); }
            50% { transform: translateY(-20px) scale(1.05); }
        }

        /* --- Animated Tech Circles --- */
        .tech-circle {
            position: absolute;
            border: 1px dashed var(--glow-color);
            border-radius: 50%;
            opacity: 0.15;
            animation: rotate 20s linear infinite;
        }
        .c1 { width: 300px; height: 300px; animation-duration: 25s; }
        .c2 { width: 450px; height: 450px; animation-direction: reverse; }

        @keyframes rotate { 100% { transform: rotate(360deg); } }

        /* --- Controls --- */
        .exit-btn {
            background: transparent;
            color: white;
            border: 1px solid white;
            padding: 10px 30px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 2px;
            transition: 0.4s;
            text-decoration: none;
            display: inline-block;
            margin-top: 20px;
            font-size: 0.8rem;
        }

        .exit-btn:hover {
            background: var(--p-red);
            border-color: var(--p-red);
            box-shadow: 0 0 20px var(--p-red);
            color: white;
            transform: skewX(-10deg);
        }

        /* --- Decorative Data HUD --- */
        .data-stream {
            position: absolute;
            bottom: 20px; right: 20px;
            font-family: monospace;
            font-size: 0.6rem;
            color: var(--p-red);
            opacity: 0.5;
            text-align: right;
        }
    </style>
</head>
<body>

<div class="lab-bg"></div>

<div class="preview-wrapper">
    <div class="hud-container">
        <div class="side-panel">
            <div>
                <span class="status-tag">System Active</span>
                <h1 id="p-name">Loading...</h1>
                <div id="rarity-bar" style="height: 4px; width: 60px; margin: 15px 0;"></div>
                <p id="p-desc" class="text-secondary small mt-3"></p>
            </div>

            <div class="d-none d-lg-block">
                <div class="mb-4">
                    <small class="text-secondary d-block mb-1">DATA_SYNC_PROGRESS</small>
                    <div class="progress bg-dark" style="height: 3px; border-radius: 0;">
                        <div class="progress-bar bg-danger" style="width: 88%"></div>
                    </div>
                </div>
                <a href="javascript:history.back()" class="exit-btn">Close Lab</a>
            </div>
        </div>

        <div class="viewport-main">
            <div class="tech-circle c1"></div>
            <div class="tech-circle c2"></div>
            
            <i id="p-icon" class="big-icon"></i>

            <div class="data-stream">
                MESH_ID: 882-X<br>SYNC: STABLE<br>BUFFER: 100%
            </div>
        </div>

        <div class="d-lg-none p-3 text-center border-top border-secondary">
             <a href="javascript:history.back()" class="exit-btn">Close Lab</a>
        </div>
    </div>
</div>

<script>
    const params = new URLSearchParams(window.location.search);
    const name = params.get('name') || "Victory Dance";
    const rarity = params.get('rarity') || "epic";
    const icon = params.get('icon') || "fas fa-running";
    const desc = params.get('desc') || "Neural sync complete. Mesh ready.";

    document.getElementById('p-name').innerText = name;
    document.getElementById('p-desc').innerText = desc;
    document.getElementById('p-icon').className = icon + " big-icon";

    // Set Rarity Color Theme
    let color = "#ff003c"; 
    if(rarity === 'epic') color = "#9d50bb";
    if(rarity === 'legendary') color = "#ffcc00";
    if(rarity === 'rare') color = "#00d2ff";

    document.documentElement.style.setProperty('--glow-color', color);
    document.getElementById('rarity-bar').style.backgroundColor = color;
    document.getElementById('rarity-bar').style.boxShadow = `0 0 10px ${color}`;
</script>

</body>
</html>
