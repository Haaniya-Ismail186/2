<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Level 4: The Loot City</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="ui-container">
        <div class="ui-left">
            <p>TIME: <span id="timer">8:00</span></p>
            <p>HEALTH: <span id="health">100%</span></p>
            <p>ENEMIES: <span id="enemy-count">12</span></p>
            <p>AMMO: <span id="ammo">300</span></p>
        </div>
    </div>

    <div id="controls">
        <button id="move-btn">MOVE</button>
        <button id="fire-btn">FIRE</button>
    </div>

    <div id="game-over-screen" style="display: none;">
        <h1 id="result-title">MISSION SUCCESS</h1>
        <button onclick="location.reload()">RESTART</button>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
    <script src="level4.js"></script>
</body>
</html>
