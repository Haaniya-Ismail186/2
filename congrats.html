<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Upgrade Successful | Animex</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Oxanium:wght@300;500;800&display=swap');

        :root {
            --reward-color: #ffcc00; /* Default Gold */
        }

        body {
            background: #000;
            color: #fff;
            font-family: 'Oxanium', sans-serif;
            margin: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        /* --- Celebration Background --- */
        .bg-glow {
            position: absolute;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at center, rgba(255, 204, 0, 0.15) 0%, #000 70%);
            z-index: 1;
        }

        .main-container {
            position: relative;
            z-index: 10;
            width: 90%;
            max-width: 600px;
            text-align: center;
            padding: 20px;
        }

        /* --- Success Header --- */
        .status-tag {
            font-size: 0.8rem;
            letter-spacing: 4px;
            color: var(--reward-color);
            text-transform: uppercase;
            margin-bottom: 10px;
            animation: fadeInDown 0.8s ease;
        }

        /* --- Weapon Display --- */
        .weapon-showcase {
            position: relative;
            margin: 40px 0;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .final-icon {
            font-size: clamp(8rem, 35vw, 15rem);
            color: #fff;
            filter: drop-shadow(0 0 60px var(--reward-color));
            animation: weaponAppear 1.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 5;
        }

        @keyframes weaponAppear {
            0% { transform: scale(0) rotate(-45deg); opacity: 0; }
            80% { transform: scale(1.1) rotate(5deg); }
            100% { transform: scale(1) rotate(0deg); opacity: 1; }
        }

        /* Shine Effect behind weapon */
        .shine {
            position: absolute;
            width: 200px;
            height: 200px;
            background: var(--reward-color);
            filter: blur(100px);
            opacity: 0.3;
            animation: rotateShine 4s linear infinite;
        }

        @keyframes rotateShine {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        /* --- Level Info --- */
        .info-section h1 {
            font-weight: 800;
            font-size: clamp(1.8rem, 8vw, 3rem);
            text-transform: uppercase;
            margin: 0;
            letter-spacing: 2px;
        }

        .level-badge {
            display: inline-block;
            background: var(--reward-color);
            color: #000;
            padding: 6px 25px;
            font-weight: 800;
            margin-top: 15px;
            clip-path: polygon(10% 0, 100% 0, 90% 100%, 0 100%);
            box-shadow: 0 0 20px rgba(255, 204, 0, 0.5);
        }

        /* --- Buttons --- */
        .button-group {
            margin-top: 50px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            align-items: center;
        }

        .btn-lobby {
            background: transparent;
            border: 1px solid rgba(255,255,255,0.3);
            color: #fff;
            padding: 12px 50px;
            text-transform: uppercase;
            letter-spacing: 2px;
            transition: 0.3s;
            width: 100%;
            max-width: 300px;
        }

        .btn-lobby:hover {
            background: #fff;
            color: #000;
            box-shadow: 0 0 20px rgba(255,255,255,0.2);
        }

        /* Floating Particles */
        .particle {
            position: absolute;
            background: var(--reward-color);
            border-radius: 50%;
            pointer-events: none;
            opacity: 0.6;
            animation: float 4s infinite ease-in;
        }

        @keyframes float {
            0% { transform: translateY(110vh) scale(0); opacity: 1; }
            100% { transform: translateY(-10vh) scale(1.2); opacity: 0; }
        }
    </style>
</head>
<body>

<div class="bg-glow" id="particle-container"></div>

<div class="main-container">
    <div class="status-tag">System Evolution Success</div>
    
    <div class="weapon-showcase">
        <div class="shine"></div>
        <i id="f-icon" class="fas fa-gun final-icon"></i>
    </div>

    <div class="info-section">
        <h1 id="f-name">WEAPON NAME</h1>
        <div class="level-badge">LEVEL <span id="f-level">1</span> UNLOCKED</div>
        <p class="text-secondary mt-3 small">All modules stabilized. Weapon efficiency increased by 25%.</p>
    </div>

    <div class="button-group">
        <button class="btn-lobby" onclick="location.href='index.html'">Return to Lobby</button>
    </div>
</div>

<script>
    // 1. Data load karna URL se
    const params = new URLSearchParams(window.location.search);
    const name = params.get('name') || "ASSET";
    const level = parseInt(params.get('level') || "0") + 1; // Level up ho gaya
    const icon = params.get('icon') || "fas fa-fire";
    const theme = params.get('theme');

    // 2. UI Update
    document.getElementById('f-name').innerText = name.toUpperCase();
    document.getElementById('f-icon').className = icon + " final-icon";
    document.getElementById('f-level').innerText = level;

    // 3. Dynamic Theme Color
    let themeColor = "#ffcc00"; // Default Gold
    if(theme === 'ice') themeColor = "#00d2ff";
    if(theme === 'epic') themeColor = "#9d50bb";
    if(theme === 'gold') themeColor = "#ffcc00";

    document.documentElement.style.setProperty('--reward-color', themeColor);

    // 4. Create Particles
    const container = document.getElementById('particle-container');
    for (let i = 0; i < 40; i++) {
        const p = document.createElement('div');
        p.className = 'particle';
        p.style.left = Math.random() * 100 + 'vw';
        p.style.width = Math.random() * 6 + 'px';
        p.style.height = p.style.width;
        p.style.animationDuration = (Math.random() * 3 + 2) + 's';
        p.style.animationDelay = Math.random() * 5 + 's';
        container.appendChild(p);
    }
</script>

</body>
</html>
